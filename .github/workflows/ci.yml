name: CI Quality Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  sonarcloud:
    name: Build, Test and Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Important : SonarCloud a besoin de l'historique complet pour l'analyse du "Clean Code"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm" # Accélère les builds suivants

      - name: Install dependencies
        run: npm ci # Utiliser 'npm ci' est plus fiable en environnement CI que 'npm install'

      - name: Run Linter (ESLint)
        run: npm run lint
        continue-on-error: false

      - name: Run Tests with Coverage
        run: npm test -- --coverage # SonarCloud a besoin du rapport de couverture pour être vraiment utile

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2.0.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Nécessaire pour commenter les PR
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=VOTRE_PROJECT_KEY
            -Dsonar.organization=VOTRE_ORGANISATION -Dsonar.sources=src
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
